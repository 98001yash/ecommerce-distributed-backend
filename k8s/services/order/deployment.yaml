apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ecommerce/order-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8093

          envFrom:
            - configMapRef:
                name: order-config
            - secretRef:
                name: order-secret