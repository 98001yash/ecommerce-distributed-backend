apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gcr.io/ecommerce-distributed-system/api-gateway:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8081

          envFrom:
            - configMapRef:
                name: gateway-config