apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ecommerce/inventory-service:1.0
          ports:
            - containerPort: 8092

          envFrom:
            - configMapRef:
                name: inventory-config
            - secretRef:
                name: inventory-secret