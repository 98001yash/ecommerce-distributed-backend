apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: gcr.io/ecommerce-distributed-system/payment-service:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8094

          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secret