apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ecommerce/auth-service:1.0
          ports:
            - containerPort: 8090

          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret